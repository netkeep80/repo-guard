name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Validate repo-policy.json
        run: npx repo-guard

      - name: Run schema tests
        run: npm run test:schemas

      - name: Run diff-rule tests
        run: npm run test:diff

      - name: Run contract extraction tests
        run: npm run test:contract

      - name: Run GitHub PR integration tests
        run: npm run test:github-pr

      - name: Run hardening tests
        run: npm run test:hardening

      - name: Run repo-root separation tests
        run: npm run test:repo-root

      - name: Run init scaffolding tests
        run: npm run test:init

      - name: Run PR policy check
        if: github.event_name == 'pull_request' && !github.event.pull_request.draft
        uses: ./
        with:
          mode: check-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  smoke-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Smoke-test packaged artifact
        run: |
          # Pack the package and capture the tarball filename
          npm pack 2>/dev/null
          TARBALL=$(ls repo-guard-*.tgz)
          REPODIR="$PWD"
          TMPDIR=$(mktemp -d)
          # Install from tarball into a fresh temp directory (simulates downstream consumer)
          npm install --prefix "$TMPDIR" "$REPODIR/$TARBALL"
          # Run repo-guard from the installed package against this repo's policy
          "$TMPDIR/node_modules/.bin/repo-guard" --repo-root "$REPODIR"
