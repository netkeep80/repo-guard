name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  validate:
    # repo-guard's own CI is intentionally blocking: this job protects the
    # package, schemas, and reusable Action behavior before changes can merge.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Validate repo-policy.json
        run: npx repo-guard

      - name: Run schema tests
        run: npm run test:schemas

      - name: Run diff-rule tests
        run: npm run test:diff

      - name: Run contract extraction tests
        run: npm run test:contract

      - name: Run GitHub PR integration tests
        run: npm run test:github-pr

      - name: Run hardening tests
        run: npm run test:hardening

      - name: Run anchor extraction tests
        run: npm run test:anchors

      - name: Run integration extraction tests
        run: npm run test:integration

      - name: Run integration diagnostics tests
        run: npm run test:integration-diagnostics

      - name: Run integration fixture e2e tests
        run: npm run test:integration-fixtures

      - name: Run trace evidence rule tests
        run: npm run test:trace-evidence

      - name: Run policy profile tests
        run: npm run test:profiles

      - name: Run repo-root separation tests
        run: npm run test:repo-root

      - name: Run init scaffolding tests
        run: npm run test:init

      - name: Run release ref verifier tests
        run: npm run test:release-ref

      - name: Run doctor diagnostics tests
        run: npm run test:doctor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run PR policy check
        # Self-host repo-guard in blocking mode once a PR is ready for review.
        # Draft PRs stay unblocked so work-in-progress branches can iterate.
        if: github.event_name == 'pull_request' && !github.event.pull_request.draft
        uses: ./
        with:
          mode: check-pr
          enforcement: blocking
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish repo-guard summary
        if: always() && github.event_name == 'pull_request' && !github.event.pull_request.draft
        run: echo "### repo-guard" >> "$GITHUB_STEP_SUMMARY"

      - name: Exercise advisory policy mode
        run: |
          set -euo pipefail
          TMP_FILE="$(mktemp)"
          cp README.md "$TMP_FILE"
          trap 'cp "$TMP_FILE" README.md; rm -f "$TMP_FILE"; git reset --quiet README.md' EXIT

          printf '\n%s: advisory fixture\n' "TO""DO" >> README.md
          git add README.md
          OUTPUT="$(node src/repo-guard.mjs --enforcement advisory check-diff 2>&1)"
          STATUS=$?
          printf '%s\n' "$OUTPUT"

          test "$STATUS" -eq 0

          echo "$OUTPUT" | grep -q "WARN: content-rules"
          echo "$OUTPUT" | grep -q "Result: failed"
          echo "$OUTPUT" | grep -q "mode: advisory"

  smoke-pack:
    # Packaging smoke tests are blocking because downstream users pin released
    # artifacts and need the installable tarball to match the source tree.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci

      - name: Smoke-test packaged artifact
        run: |
          # Pack the package and capture the tarball filename
          npm pack 2>/dev/null
          TARBALL=$(ls repo-guard-*.tgz)
          REPODIR="$PWD"
          TMPDIR=$(mktemp -d)
          # Install from tarball into a fresh temp directory (simulates downstream consumer)
          npm install --prefix "$TMPDIR" "$REPODIR/$TARBALL"
          # Run repo-guard from the installed package against this repo's policy
          "$TMPDIR/node_modules/.bin/repo-guard" --repo-root "$REPODIR"
