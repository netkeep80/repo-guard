name: Release integrity

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published release tag to verify, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify-release-ref:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify package version has a published Action ref
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: node scripts/verify-release-ref.mjs --tag "$RELEASE_TAG"
